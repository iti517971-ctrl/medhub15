<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedHub 15 - منصة دفعة الطب 15</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1e40af;
      --primary-dark: #1e3a8a;
      --secondary: #3b82f6;
      --accent: #60a5fa;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --success: #10b981;
      --danger: #ef4444;
      --border: #334155;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    .header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      padding: 20px;
      box-shadow: 0 4px 20px rgba(30, 64, 175, 0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo i {
      font-size: 2rem;
      color: var(--accent);
    }

    .logo h1 {
      font-size: 1.8rem;
      font-weight: 900;
    }

    .logo span {
      font-size: 0.9rem;
      color: var(--accent);
      font-weight: 600;
    }

    .stats {
      display: flex;
      gap: 20px;
      font-size: 0.9rem;
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }

    .container {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .search-bar {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 25px;
      transition: all 0.3s;
    }

    .search-bar:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .search-bar i {
      color: var(--text-dim);
      font-size: 1.2rem;
    }

    .search-bar input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 1rem;
      width: 100%;
      font-family: 'Cairo', sans-serif;
    }

    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .filter-btn {
      background: var(--card);
      border: 2px solid var(--border);
      color: var(--text-dim);
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s;
      font-family: 'Cairo', sans-serif;
      font-weight: 600;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .resources-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .resource-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      transition: all 0.3s;
      cursor: pointer;
    }

    .resource-card:hover {
      transform: translateY(-5px);
      border-color: var(--primary);
      box-shadow: 0 10px 30px rgba(30, 64, 175, 0.2);
    }

    .resource-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 12px;
    }

    .resource-type {
      background: var(--primary);
      color: white;
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .resource-type.ملزمة { background: #8b5cf6; }
    .resource-type.محاضرة { background: #06b6d4; }
    .resource-type.مرجع { background: #f59e0b; }
    .resource-type.اختبار { background: #ef4444; }

    .resource-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }

    .resource-meta {
      display: flex;
      gap: 15px;
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-bottom: 15px;
    }

    .resource-meta i {
      margin-left: 5px;
    }

    .resource-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-weight: 600;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--secondary);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--border);
      color: var(--text-dim);
    }

    .btn-outline:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .fab {
      position: fixed;
      bottom: 30px;
      left: 30px;
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
      transition: all 0.3s;
      z-index: 99;
    }

    .fab:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 35px rgba(59, 130, 246, 0.6);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--card);
      border-radius: 20px;
      padding: 30px;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .modal-header h2 {
      font-size: 1.5rem;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 1.5rem;
      cursor: pointer;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text);
    }

    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 12px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
    }

    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }

    .empty-state i {
      font-size: 4rem;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--success);
      color: white;
      padding: 15px 25px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
      opacity: 0;
      transition: all 0.3s;
      z-index: 1001;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
        gap: 15px;
      }
      
      .logo h1 {
        font-size: 1.5rem;
      }
      
      .resources-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-content">
      <div class="logo">
        <i class="fas fa-stethoscope"></i>
        <div>
          <h1>MedHub 15</h1>
          <span>منصة دفعة الطب 15</span>
        </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-number" id="totalResources">0</div>
          <div>ملف</div>
        </div>
        <div class="stat">
          <div class="stat-number" id="totalViews">0</div>
          <div>مشاهدة</div>
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="search-bar">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="ابحث عن ملزمة، محاضرة، دكتور...">
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">الكل</button>
      <button class="filter-btn" data-filter="ملزمة">ملازم</button>
      <button class="filter-btn" data-filter="محاضرة">محاضرات</button>
      <button class="filter-btn" data-filter="مرجع">مراجع</button>
      <button class="filter-btn" data-filter="اختبار">اختبارات</button>
    </div>

    <div class="resources-grid" id="resourcesGrid"></div>
    
    <div class="empty-state" id="emptyState">
      <i class="fas fa-folder-open"></i>
      <h3>لا توجد ملفات بعد</h3>
      <p>كن أول من يضيف ملزمة أو محاضرة للدفعة</p>
    </div>
  </div>

  <button class="fab" onclick="openModal()">
    <i class="fas fa-plus"></i>
  </button>

  <div class="modal" id="addModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2><i class="fas fa-plus-circle"></i> إضافة ملف جديد</h2>
        <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
      </div>
      <form id="resourceForm">
        <div class="form-group">
          <label>عنوان الملف *</label>
          <input type="text" id="title" required placeholder="مثال: محاضرة التشريح - الجهاز العصبي">
        </div>
        <div class="form-group">
          <label>النوع *</label>
          <select id="type" required>
            <option value="">اختر النوع</option>
            <option value="ملزمة">ملزمة</option>
            <option value="محاضرة">محاضرة</option>
            <option value="مرجع">مرجع</option>
            <option value="اختبار">اختبار</option>
          </select>
        </div>
        <div class="form-group">
          <label>المادة</label>
          <input type="text" id="subject" placeholder="مثال: تشريح، فسيولوجي">
        </div>
        <div class="form-group">
          <label>الدكتور</label>
          <input type="text" id="doctor" placeholder="مثال: د. أحمد محمد">
        </div>
        <div class="form-group">
          <label>رابط Google Drive *</label>
          <input type="url" id="link" required placeholder="https://drive.google.com/...">
        </div>
        <div class="form-group">
          <label>ملاحظات</label>
          <textarea id="notes" rows="3" placeholder="أي ملاحظات إضافية"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; padding:15px;">
          <i class="fas fa-save"></i> حفظ الملف
        </button>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let resources = JSON.parse(localStorage.getItem('medhub15_resources')) || [];
    let views = parseInt(localStorage.getItem('medhub15_views')) || 0;
    let currentFilter = 'all';

    // تحديث المشاهدات
    views++;
    localStorage.setItem('medhub15_views', views);
    document.getElementById('totalViews').textContent = views;

    function renderResources() {
      const grid = document.getElementById('resourcesGrid');
      const emptyState = document.getElementById('emptyState');
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      
      let filtered = resources.filter(r => {
        const matchFilter = currentFilter === 'all' || r.type === currentFilter;
        const matchSearch = r.title.toLowerCase().includes(searchTerm) || 
                           r.subject.toLowerCase().includes(searchTerm) ||
                           r.doctor.toLowerCase().includes(searchTerm);
        return matchFilter && matchSearch;
      });

      document.getElementById('totalResources').textContent = resources.length;

      if (filtered.length === 0) {
        grid.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      grid.innerHTML = filtered.map((r, i) => `
        <div class="resource-card">
          <div class="resource-header">
            <span class="resource-type ${r.type}">${r.type}</span>
            <button class="btn-outline" style="padding:5px 10px; border:none;" onclick="deleteResource(${i})">
              <i class="fas fa-trash"></i>
            </button>
          </div>
          <div class="resource-title">${r.title}</div>
          <div class="resource-meta">
            ${r.subject ? `<span><i class="fas fa-book"></i>${r.subject}</span>` : ''}
            ${r.doctor ? `<span><i class="fas fa-user-md"></i>${r.doctor}</span>` : ''}
          </div>
          ${r.notes ? `<p style="color:var(--text-dim); font-size:0.9rem; margin-bottom:15px;">${r.notes}</p>` : ''}
          <div class="resource-actions">
            <button class="btn btn-primary" onclick="window.open('${r.link}', '_blank')">
              <i class="fas fa-download"></i> تحميل
            </button>
            <button class="btn btn-outline" onclick="copyLink('${r.link}')">
              <i class="fas fa-link"></i> نسخ
            </button>
          </div>
        </div>
      `).join('');
    }

    function openModal() {
      document.getElementById('addModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('addModal').classList.remove('active');
      document.getElementById('resourceForm').reset();
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function copyLink(link) {
      navigator.clipboard.writeText(link);
      showToast('تم نسخ الرابط ✅');
    }

    function deleteResource(index) {
      if (confirm('متأكد تبي تحذف هذا الملف؟')) {
        resources.splice(index, 1);
        localStorage.setItem('medhub15_resources', JSON.stringify(resources));
        renderResources();
        showToast('تم الحذف بنجاح');
      }
    }

    document.getElementById('resourceForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const newResource = {
        title: document.getElementById('title').value,
        type: document.getElementById('type').value,
        subject: document.getElementById('subject').value,
        doctor: document.getElementById('doctor').value,
        link: document.getElementById('link').value,
        notes: document.getElementById('notes').value,
        date: new Date().toISOString()
      };
      resources.unshift(newResource);
      localStorage.setItem('medhub15_resources', JSON.stringify(resources));
      closeModal();
      renderResources();
      showToast('تمت الإضافة بنجاح ✅');
    });

    document.getElementById('searchInput').addEventListener('input', renderResources);

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderResources();
      });
    });

    // إغلاق المودال عند الضغط خارجه
    document.getElementById('addModal').addEventListener('click', (e) => {
      if (e.target.id === 'addModal') closeModal();
    });

    // تحميل البيانات عند فتح الصفحة
    renderResources();
  </script>
</body>
</html>
